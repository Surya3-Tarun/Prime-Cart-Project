<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.dashboard{
display:flex;
gap:30px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
width:200px;
text-align:center;
}

h1{
margin-bottom:40px;
}

</style>

</head>

<body>

<h1>Admin Dashboard</h1>

<div class="dashboard">

<div class="card">
<h3>Total Orders</h3>
<h2>{{ total_orders }}</h2>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h2>₹ {{ total_revenue }}</h2>
</div>

<div class="card">
<h3>Total Products</h3>
<h2>{{ total_products }}</h2>
</div>

</div>

</body>
</html>

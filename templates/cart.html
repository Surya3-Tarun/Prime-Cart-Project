<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
font-family:Arial;
}

.navbar{
background:black;
}

.navbar a{
color:white;
font-weight:bold;
}

.cart-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.product-img{
height:120px;
object-fit:contain;
}

.qty-btn{
padding:5px 12px;
border:none;
background:#ddd;
font-weight:bold;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:6px 15px;
cursor:pointer;
}

.checkout-btn{
background:green;
color:white;
border:none;
padding:12px 30px;
font-size:18px;
}

</style>

</head>

<body>


<nav class="navbar navbar-expand-lg px-4">
<a class="navbar-brand text-white" href="/">PrimeCart</a>

<div class="ms-auto">
<a href="/wishlist/" class="text-white me-4">Wishlist ❤️</a>
<a href="/cart/" class="text-white">Cart 🛒</a>
</div>

</nav>


<div class="container mt-5">

<div class="cart-box">

<h2 class="mb-4">Your Cart</h2>


<div class="row fw-bold border-bottom pb-2 mb-3">

<div class="col-md-2">Image</div>
<div class="col-md-3">Product</div>
<div class="col-md-2">Price</div>
<div class="col-md-2">Quantity</div>
<div class="col-md-2">Total</div>
<div class="col-md-1">Remove</div>

</div>


{% for item in cart_items %}

<div class="row align-items-center border-bottom py-3">

<div class="col-md-2">
<img src="{{ item.image }}" class="img-fluid product-img">
</div>

<div class="col-md-3">
<h6>{{ item.name }}</h6>
</div>

<div class="col-md-2">
₹ {{ item.price }}
</div>


<div class="col-md-2">

<a href="/increase/{{ item.id }}/">
<button class="qty-btn">+</button>
</a>

<span class="mx-2">{{ item.quantity }}</span>

<a href="/decrease/{{ item.id }}/">
<button class="qty-btn">-</button>
</a>

</div>


<div class="col-md-2">
₹ {{ item.total }}
</div>


<div class="col-md-1">

<a href="/remove-from-cart/{{ item.id }}/">
<button class="remove-btn">X</button>
</a>

</div>

</div>

{% empty %}

<div class="text-center mt-4">

<h4>Your cart is empty</h4>

<a href="/" class="btn btn-primary mt-3">
Continue Shopping
</a>

</div>

{% endfor %}


<div class="row mt-4">

<div class="col-md-6"></div>

<div class="col-md-6 text-end">

<h3>Total Price : ₹ {{ total_price }}</h3>

<br>

<a href="/checkout/">

<button class="checkout-btn">
Proceed to Checkout
</button>

</a>

</div>

</div>

</div>

</div>


</body>
</html>

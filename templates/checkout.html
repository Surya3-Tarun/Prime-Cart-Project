<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
font-family:Arial;
padding:40px;
}

.checkout-box{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

.total{
font-size:22px;
font-weight:bold;
color:green;
margin-bottom:20px;
}

.form-control{
margin-bottom:15px;
}

.payment-box{
margin-top:20px;
}

.payment-option{
margin-bottom:10px;
}

.card-details,
.upi-details{
display:none;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

</style>

</head>

<body>

<div class="checkout-box">

<h2>Checkout</h2>

<p class="total">Total Price: ₹ {{ total_price }}</p>

<form method="POST">

{% csrf_token %}

<input type="text" name="name" class="form-control" placeholder="Full Name" required>

<input type="text" name="phone" class="form-control" placeholder="Phone Number" required>

<textarea name="address" class="form-control" placeholder="Full Address" required></textarea>

<input type="text" name="landmark" class="form-control" placeholder="Landmark">

<input type="text" name="city" class="form-control" placeholder="City">

<input type="text" name="pincode" class="form-control" placeholder="Pincode">

<input type="text" name="coupon" class="form-control" placeholder="Coupon Code">

<div class="payment-box">

<h4>Payment Method</h4>

<div class="payment-option">

<input type="radio" name="payment" value="cod" checked onclick="hideFields()">
Cash on Delivery

</div>

<div class="payment-option">

<input type="radio" name="payment" value="upi" onclick="showUPI()">
UPI

</div>

<div class="payment-option">

<input type="radio" name="payment" value="card" onclick="showCard()">
Credit / Debit Card

</div>

</div>


<!-- UPI DETAILS -->

<div class="upi-details" id="upiBox">

<input type="text" name="upi_id" class="form-control" placeholder="Enter UPI ID">

</div>


<!-- CARD DETAILS -->

<div class="card-details" id="cardBox">

<input type="text" name="card_number" class="form-control" placeholder="Card Number">

<input type="text" name="card_name" class="form-control" placeholder="Name on Card">

<input type="text" name="expiry" class="form-control" placeholder="Expiry (MM/YY)">

<input type="text" name="cvv" class="form-control" placeholder="CVV">

</div>


<button type="submit">Place Order</button>

</form>

</div>


<script>

function showUPI(){

document.getElementById("upiBox").style.display="block";
document.getElementById("cardBox").style.display="none";

}

function showCard(){

document.getElementById("cardBox").style.display="block";
document.getElementById("upiBox").style.display="none";

}

function hideFields(){

document.getElementById("upiBox").style.display="none";
document.getElementById("cardBox").style.display="none";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>

<head>

<title>{{ product.name }}</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.product{
background:white;
padding:30px;
border-radius:10px;
width:600px;
margin:auto;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

img{
width:300px;
display:block;
margin-bottom:20px;
}

.price{
color:#B12704;
font-size:24px;
font-weight:bold;
}

button{
background:#FFD814;
border:none;
padding:10px 20px;
cursor:pointer;
margin-right:10px;
}

</style>

</head>

<body>

<div class="product">

<h1>{{ product.name }}</h1>

<img src="{{ product.image.url }}">

<p>{{ product.description }}</p>

<p class="price">₹ {{ product.price }}</p>

<br>

<a href="/add-to-cart/{{ product.id }}/">
<button>Add to Cart</button>
</a>

<a href="/add-wishlist/{{ product.id }}/">
<button>❤️ Add to Wishlist</button>
</a>

<a href="/cart/">
<button>Go To Cart</button>
</a>

</div>

</body>

</html>
